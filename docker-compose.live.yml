services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: "${DATABASE_URL:-sqlite+aiosqlite:////app/data/app.sqlite3}"
      ENABLE_SCHEDULER: "${ENABLE_SCHEDULER:-true}"
      SEED_SAMPLE_DATA: "${SEED_SAMPLE_DATA:-false}"
      USE_SAMPLE_CLIENT_WHEN_NO_KEY: "${USE_SAMPLE_CLIENT_WHEN_NO_KEY:-false}"
      ENABLE_INCHEON_COLLECTION: "${ENABLE_INCHEON_COLLECTION:-false}"
      ENABLE_FEE_COLLECTION: "${ENABLE_FEE_COLLECTION:-false}"
      COLLECT_INTERVAL_SECONDS: "${COLLECT_INTERVAL_SECONDS:-1200}"
      MANUAL_COLLECT_MIN_INTERVAL_SECONDS: "${MANUAL_COLLECT_MIN_INTERVAL_SECONDS:-1200}"
      API_TIMEOUT_SECONDS: "${API_TIMEOUT_SECONDS:-15}"
      AIRPORT_CODES_CSV: "${AIRPORT_CODES_CSV:-GMP,PUS,CJU}"
      CORS_ORIGINS_CSV: "${CORS_ORIGINS_CSV:-http://localhost:3000}"
      APP_TIMEZONE: "${APP_TIMEZONE:-Asia/Seoul}"
      DATA_GO_KR_SERVICE_KEY: "${DATA_GO_KR_SERVICE_KEY:-}"
    volumes:
      - parking_radar_backend_data_live:/app/data
    ports:
      - "${BACKEND_LIVE_PORT:-8010}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  parking_radar_backend_data_live:
