services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: "${DATABASE_URL:-sqlite+aiosqlite:////app/data/app.sqlite3}"
      ENABLE_SCHEDULER: "${ENABLE_SCHEDULER:-false}"
      SEED_SAMPLE_DATA: "${SEED_SAMPLE_DATA:-true}"
      USE_SAMPLE_CLIENT_WHEN_NO_KEY: "${USE_SAMPLE_CLIENT_WHEN_NO_KEY:-true}"
      ENABLE_INCHEON_COLLECTION: "${ENABLE_INCHEON_COLLECTION:-false}"
      ENABLE_FEE_COLLECTION: "${ENABLE_FEE_COLLECTION:-false}"
      COLLECT_INTERVAL_SECONDS: "${COLLECT_INTERVAL_SECONDS:-300}"
      API_TIMEOUT_SECONDS: "${API_TIMEOUT_SECONDS:-15}"
      AIRPORT_CODES_CSV: "${AIRPORT_CODES_CSV:-GMP,PUS,CJU}"
      CORS_ORIGINS_CSV: "${CORS_ORIGINS_CSV:-http://localhost:3000}"
      APP_TIMEZONE: "${APP_TIMEZONE:-Asia/Seoul}"
      DATA_GO_KR_SERVICE_KEY: "${DATA_GO_KR_SERVICE_KEY:-}"
    volumes:
      - parking_radar_backend_data:/app/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: "${NEXT_PUBLIC_API_BASE_URL:-}"
        NEXT_PUBLIC_API_PORT: "${NEXT_PUBLIC_API_PORT:-8000}"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  parking_radar_backend_data:
